name: CI/CD Pipeline (Production & Staging)

on:
    push:
        branches:
            - release # Production trigger
            - main # Staging trigger
        paths-ignore:
            - "docs/**/*.md"
            - "*.md"
            - ".github/deployment-profiles.yml"
    workflow_dispatch:
        inputs:
            environment:
                description: "Deploy environment (production / staging)"
                required: true
                default: "staging"
                type: choice
                options:
                    - production
                    - staging
            skip_tests:
                description: "Skip test layers (comma-separated: unit,integration,e2e) - Leave empty to use profile"
                required: false
                default: ""
                type: string

jobs:
    # Load deployment profile configuration
    load-profile:
        name: Load Deployment Profile
        runs-on: ubuntu-latest
        outputs:
            skip_tests: ${{ steps.get-profile.outputs.skip_tests }}
            profile_name: ${{ steps.get-profile.outputs.profile_name }}
        steps:
            - uses: actions/checkout@v4

            - name: Install yq
              run: |
                  sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                  sudo chmod +x /usr/local/bin/yq

            - name: Get Deployment Profile
              id: get-profile
              run: |
                  # Determine environment from branch or manual input
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                    ENV="${{ github.event.inputs.environment }}"
                    MANUAL_SKIP="${{ github.event.inputs.skip_tests }}"
                  elif [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
                    ENV="production"
                    MANUAL_SKIP=""
                  elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    ENV="staging"
                    MANUAL_SKIP=""
                  else
                    ENV="staging"
                    MANUAL_SKIP=""
                  fi

                  echo "Detected environment: $ENV"

                  # If manual skip_tests provided, use it
                  if [[ -n "$MANUAL_SKIP" ]]; then
                    echo "skip_tests=$MANUAL_SKIP" >> $GITHUB_OUTPUT
                    echo "profile_name=custom" >> $GITHUB_OUTPUT
                    echo "✅ Using manual skip_tests: $MANUAL_SKIP"
                    exit 0
                  fi

                  # Load profile from deployment-profiles.yml
                  if [[ ! -f .github/deployment-profiles.yml ]]; then
                    echo "⚠️ Warning: deployment-profiles.yml not found, using full-test profile"
                    echo "skip_tests=" >> $GITHUB_OUTPUT
                    echo "profile_name=full-test" >> $GITHUB_OUTPUT
                    exit 0
                  fi

                  # Parse YAML to get profile
                  PROFILE=$(yq eval ".${ENV}.profile" .github/deployment-profiles.yml)
                  CUSTOM_SKIP=$(yq eval ".${ENV}.skip_tests // \"\"" .github/deployment-profiles.yml)

                  # Check if custom skip_tests is defined
                  if [[ "$CUSTOM_SKIP" != "null" && -n "$CUSTOM_SKIP" ]]; then
                    SKIP_TESTS="$CUSTOM_SKIP"
                    echo "✅ Using custom skip_tests for $ENV: $SKIP_TESTS"
                  else
                    # Use profile definition
                    SKIP_TESTS=$(yq eval ".profiles.${PROFILE}.skip_tests" .github/deployment-profiles.yml)
                    echo "✅ Using profile '$PROFILE' for $ENV: skip_tests='$SKIP_TESTS'"
                  fi

                  echo "skip_tests=$SKIP_TESTS" >> $GITHUB_OUTPUT
                  echo "profile_name=$PROFILE" >> $GITHUB_OUTPUT
                  echo "Final configuration - Profile: $PROFILE, Skip: $SKIP_TESTS"

    # Test control: Unit & Integration Tests
    test-unit:
        name: Unit Tests
        needs: load-profile
        if: |
            !contains(needs.load-profile.outputs.skip_tests, 'unit')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: "npm"
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Frontend Unit Suites
              working-directory: src/frontend
              env:
                  NODE_OPTIONS: --require ./scripts/vitest-node-polyfill.cjs
              run: |
                  npm ci
                  echo "NODE_OPTIONS=$NODE_OPTIONS"
                  node -p "globalThis.SharedArrayBuffer ? 'SharedArrayBuffer available' : 'SharedArrayBuffer missing'"
                  npx vitest run src/test/pages --reporter=verbose
                  npx vitest run src/test/components --reporter=verbose
                  npx vitest run src/test/smoke.test.tsx --reporter=verbose

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: src/backend/requirements.txt

            - name: Backend Unit Tests
              working-directory: src/backend
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pytest tests/unit -v --ignore=tests/unit/security/test_cryptography.py

    test-integration:
        name: Integration Tests
        needs: [load-profile, test-unit]
        if: |
            always() &&
            !contains(needs.load-profile.outputs.skip_tests, 'integration') &&
            (needs.test-unit.result == 'success' || needs.test-unit.result == 'skipped')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: src/backend/requirements.txt

            - name: Backend Integration Tests
              working-directory: src/backend
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pytest tests/integration -v

    test-security:
        name: Security Tests
        needs: [load-profile, test-unit, test-integration]
        if: |
            always() &&
            !contains(needs.load-profile.outputs.skip_tests, 'security') &&
            (needs.test-unit.result == 'success' || needs.test-unit.result == 'skipped') &&
            (needs.test-integration.result == 'success' || needs.test-integration.result == 'skipped')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: "npm"
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Frontend Security Tests
              working-directory: src/frontend
              env:
                  NODE_OPTIONS: --require ./scripts/vitest-node-polyfill.cjs
              run: |
                  npm ci
                  echo "NODE_OPTIONS=$NODE_OPTIONS"
                  node -p "globalThis.SharedArrayBuffer ? 'SharedArrayBuffer available' : 'SharedArrayBuffer missing'"
                  npx vitest run src/test/security --reporter=verbose

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"
                  cache-dependency-path: src/backend/requirements.txt

            - name: Backend Security Tests
              working-directory: src/backend
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pytest tests/integration/api/test_security_e2e.py tests/unit/security/test_cryptography.py -v

    # Lint checks
    lint:
        name: Lint & Type Check
        needs: load-profile
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: "npm"
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Frontend Lint
              working-directory: src/frontend
              run: |
                  npm ci
                  npm run lint

    # Build Docker images
    build:
        name: Build & Push Docker Images
        needs: [load-profile, test-unit, test-integration, test-security, lint]
        if: |
            always() &&
            (needs.test-unit.result == 'success' || needs.test-unit.result == 'skipped') &&
            (needs.test-integration.result == 'success' || needs.test-integration.result == 'skipped') &&
            (needs.test-security.result == 'success' || needs.test-security.result == 'skipped') &&
            needs.lint.result == 'success'
        runs-on: ubuntu-latest
        outputs:
            should_deploy_production: ${{ steps.check.outputs.production }}
            should_deploy_staging: ${{ steps.check.outputs.staging }}
            profile_name: ${{ needs.load-profile.outputs.profile_name }}
            skip_tests: ${{ needs.load-profile.outputs.skip_tests }}
        steps:
            - uses: actions/checkout@v4

            - name: Display Deployment Configuration
              run: |
                  echo "🚀 Deployment Configuration" >> $GITHUB_STEP_SUMMARY
                  echo "- **Profile**: ${{ needs.load-profile.outputs.profile_name }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Skip Tests**: ${{ needs.load-profile.outputs.skip_tests || 'none (all tests run)' }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

                  # Also output to console
                  echo "🚀 Deployment Configuration"
                  echo "Profile: ${{ needs.load-profile.outputs.profile_name }}"
                  echo "Skip Tests: ${{ needs.load-profile.outputs.skip_tests }}"
                  echo "Branch: ${{ github.ref }}"

            - name: Check deployment target
              id: check
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/release" ]] || [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
                    echo "production=true" >> $GITHUB_OUTPUT
                    echo "staging=false" >> $GITHUB_OUTPUT
                  elif [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
                    echo "production=false" >> $GITHUB_OUTPUT
                    echo "staging=true" >> $GITHUB_OUTPUT
                  else
                    echo "production=false" >> $GITHUB_OUTPUT
                    echo "staging=false" >> $GITHUB_OUTPUT
                  fi

    # Deploy to Production
    deploy-production:
        name: Deploy to Production
        needs: build
        if: needs.build.outputs.should_deploy_production == 'true'
        runs-on: [self-hosted, linux, droplet]
        environment: production
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: release

            - name: Create deployment directory
              run: |
                  DEPLOY_DIR="/srv/lol/simulation/production"
                  mkdir -p "$DEPLOY_DIR"
                  cd "$DEPLOY_DIR"

                  # Copy source code to deployment directory
                  rsync -av --delete \
                    --exclude='.git' \
                    --exclude='node_modules' \
                    --exclude='__pycache__' \
                    --exclude='.env' \
                    $GITHUB_WORKSPACE/ ./

            - name: Create .env file
              run: |
                  DEPLOY_DIR="/srv/lol/simulation/production"
                  cat > "$DEPLOY_DIR/.env" << EOF
                  ENV=production
                  VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
                  VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_URL=${{ vars.SUPABASE_URL }}
                  SUPABASE_PUBLISHABLE_KEY=${{ vars.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
                  SOLAPI_API_KEY=${{ vars.SOLAPI_API_KEY }}
                  SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }}
                  SOLAPI_SENDER_NUMBER=${{ secrets.SOLAPI_SENDER_NUMBER }}
                  OTP_SECRET_KEY=${{ secrets.OTP_SECRET_KEY }}
                  EOF

            - name: Build and Deploy
              run: |
                  cd /srv/lol/simulation/production
                  docker compose -f docker-compose.production.yml pull || true
                  docker compose -f docker-compose.production.yml build --no-cache
                  docker compose -f docker-compose.production.yml up -d --remove-orphans

            - name: Health Check
              run: |
                  echo "Waiting for Production services to be healthy..."
                  for i in {1..20}; do
                    sleep 3
                    if curl -f http://localhost:3000/health > /dev/null 2>&1; then
                      echo "✅ Production is healthy (port 3000)"
                      exit 0
                    fi
                    echo "Attempt $i/20 - waiting..."
                  done
                  echo "❌ Production health check failed"
                  cd /srv/lol/simulation/production
                  docker compose -f docker-compose.production.yml logs --tail=100
                  exit 1

            - name: Cleanup old images
              run: |
                  docker image prune -f
                  docker volume prune -f

    # Deploy to Staging
    deploy-staging:
        name: Deploy to Staging
        needs: build
        if: needs.build.outputs.should_deploy_staging == 'true'
        runs-on: [self-hosted, linux, droplet]
        environment: staging
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main

            - name: Create deployment directory
              run: |
                  DEPLOY_DIR="/srv/lol/simulation/staging"
                  mkdir -p "$DEPLOY_DIR"
                  cd "$DEPLOY_DIR"

                  # Copy source code to deployment directory
                  rsync -av --delete \
                    --exclude='.git' \
                    --exclude='node_modules' \
                    --exclude='__pycache__' \
                    --exclude='.env' \
                    $GITHUB_WORKSPACE/ ./

            - name: Create .env file
              run: |
                  DEPLOY_DIR="/srv/lol/simulation/staging"
                  cat > "$DEPLOY_DIR/.env" << EOF
                  ENV=staging
                  VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
                  VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
                  VITE_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_URL=${{ vars.SUPABASE_URL }}
                  SUPABASE_PUBLISHABLE_KEY=${{ vars.SUPABASE_PUBLISHABLE_KEY }}
                  SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
                  SOLAPI_API_KEY=${{ vars.SOLAPI_API_KEY }}
                  SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }}
                  SOLAPI_SENDER_NUMBER=${{ secrets.SOLAPI_SENDER_NUMBER }}
                  OTP_SECRET_KEY=${{ secrets.OTP_SECRET_KEY }}
                  EOF

            - name: Build and Deploy
              run: |
                  cd /srv/lol/simulation/staging
                  docker compose -f docker-compose.staging.yml pull || true
                  docker compose -f docker-compose.staging.yml build --no-cache
                  docker compose -f docker-compose.staging.yml up -d --remove-orphans

            - name: Health Check
              run: |
                  echo "Waiting for Staging services to be healthy..."
                  for i in {1..20}; do
                    sleep 3
                    if curl -f http://localhost:4173/health > /dev/null 2>&1; then
                      echo "✅ Staging is healthy (port 4173)"
                      exit 0
                    fi
                    echo "Attempt $i/20 - waiting..."
                  done
                  echo "❌ Staging health check failed"
                  cd /srv/lol/simulation/staging
                  docker compose -f docker-compose.staging.yml logs --tail=100
                  exit 1

            - name: Cleanup old images
              run: |
                  docker image prune -f
                  docker volume prune -f

    # E2E Tests (Optional, runs after staging deployment)
    test-e2e:
        name: E2E Tests (Playwright)
        needs: [load-profile, deploy-staging]
        if: |
            !contains(needs.load-profile.outputs.skip_tests, 'e2e') &&
            needs.deploy-staging.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 18
                  cache: "npm"
                  cache-dependency-path: src/frontend/package-lock.json

            - name: Install dependencies
              working-directory: src/frontend
              run: npm ci

            - name: Install Playwright browsers
              working-directory: src/frontend
              run: npx playwright install --with-deps

            - name: Run E2E tests
              working-directory: src/frontend
              env:
                  BASE_URL: https://staging.simulation.lightoflifeclub.com
              run: npm run test:e2e

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: src/frontend/playwright-report/
                  retention-days: 7
