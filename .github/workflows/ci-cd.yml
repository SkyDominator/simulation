name: CI/CD (hosted tests + self-hosted deploy with env .env generation)

on:
  push:
    branches:
      - release       # production trigger
      - main    # staging/preview trigger
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'deploy environment (production / staging)'
        required: false
        default: 'staging'

jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Frontend: install & lint & unit tests
        working-directory: src/frontend
        run: |
          npm ci
          npm run lint
          npm run test:unit

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Backend: install & pytest
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest -q

  build-frontend:
    name: Build Frontend Artifact
    needs: lint-and-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Build frontend (Vite)
        working-directory: src/frontend
        run: |
          npm ci
          npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist

  deploy-staging:
    name: Deploy (staging)
    needs: [build-frontend]
    runs-on: [ self-hosted, linux, droplet ]
    if: |
      github.ref == 'refs/heads/main' || github.event.inputs.deploy_env == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./src/frontend/dist

      - name: Create .env for staging (secure)
        run: |
          DEST_DIR="/srv/lightoflife/simulation"
          mkdir -p "$DEST_DIR"
          # Compose uses .env in same dir
          cat > "$DEST_DIR/.env" <<EOF
          VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY=${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY=${{ vars.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL=${{ vars.SUPABASE_URL }}
          SOLAPI_API_KEY=${{ vars.SOLAPI_API_KEY }}
          SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
          SOLAPI_API_SECRET=${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER_NUMBER=${{ secrets.SOLAPI_SENDER_NUMBER }}
          ENV=staging
          EOF
          chmod 600 "$DEST_DIR/.env"
          chown deploy:deploy "$DEST_DIR/.env"
        shell: bash

      - name: Deploy to droplet (staging)
        run: |
          cd /srv/lightoflife/simulation
          docker compose -f docker-compose.yml pull || true
          docker compose -f docker-compose.yml up -d --remove-orphans --build
        shell: bash

      - name: Staging healthcheck
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "staging healthy"
              exit 0
            fi
            sleep 3
          done
          docker compose -f docker-compose.yml logs --no-color --tail=200
          exit 1
        shell: bash

  deploy-production:
    name: Deploy (production)
    needs: [build-frontend]
    runs-on: [ self-hosted, linux, droplet ]
    if: |
      github.ref == 'refs/heads/release' || github.event.inputs.deploy_env == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./src/frontend/dist

      - name: Create .env for production (secure)
        run: |
          DEST_DIR="/srv/lightoflife/simulation"
          mkdir -p "$DEST_DIR"
          cat > "$DEST_DIR/.env" <<EOF
          SUPABASE_URL=${{ vars.SUPABASE_URL_PRODUCTION }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SMS_API_KEY=${{ secrets.SMS_API_KEY }}
          ENV=production
          EOF
          chmod 600 "$DEST_DIR/.env"
          chown deploy:deploy "$DEST_DIR/.env"
        shell: bash

      - name: Deploy to droplet (production)
        run: |
          cd /srv/lightoflife/simulation
          docker compose -f docker-compose.yml pull || true
          docker compose -f docker-compose.yml up -d --remove-orphans --build
        shell: bash

      - name: Production healthcheck
        run: |
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "production healthy"
              exit 0
            fi
            sleep 3
          done
          docker compose -f docker-compose.yml logs --no-color --tail=200
          exit 1
        shell: bash

  e2e:
    name: E2E (Playwright)
    if: ${{ github.event.inputs.deploy_env == 'staging' || github.ref == 'refs/heads/staging' }}
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Run Playwright E2E
        run: |
          cd src/frontend
          npm ci
          npm run test:e2e   # or npx playwright test