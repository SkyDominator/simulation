version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src/backend
    working_dir: /app/src/backend
    command: tail -f /dev/null  # debugger (VS Code) will launch uvicorn
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./:/app:cached
      - frontend_node_modules:/app/src/my-pwa-frontend/node_modules
    environment:
      VITE_HOST: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    working_dir: /app/src/my-pwa-frontend
    # command: tail -f /dev/null  # task / debugger starts dev server
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - appnet

volumes:
  frontend_node_modules:

networks:
  appnet:
    driver: bridge