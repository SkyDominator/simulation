version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app:cached
      - /app/backend-venv  # Exclude virtual environment
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src/my-pwa-frontend:/app:cached
      - /app/node_modules  # Exclude node_modules
    environment:
      - VITE_HOST=0.0.0.0
    depends_on:
      - backend