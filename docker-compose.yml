version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      PYTHONPATH: /app/src/backend
      REPO_URL: https://github.com/SkyDominator/simulation.git
      GIT_BRANCH: main
  GITHUB_PAT_FILE: /run/secrets/github_pat
    working_dir: /app/src/backend
    volumes:
      - workspace:/app
    secrets:
      - github_pat
    ports:
      - "8000:8000"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    environment:
      VITE_HOST: 0.0.0.0
      REPO_URL: https://github.com/SkyDominator/simulation.git
      GIT_BRANCH: main
  GITHUB_PAT_FILE: /run/secrets/github_pat
    working_dir: /app/src/my-pwa-frontend
    volumes:
      - workspace:/app
    secrets:
      - github_pat
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - appnet

volumes:
  workspace:

secrets:
  github_pat:
    file: .secrets/github_pat.txt

networks:
  appnet:
    driver: bridge