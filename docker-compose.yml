version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      PYTHONPATH: /app/src/backend
      REPO_URL: https://github.com/SkyDominator/simulation.git
      GIT_BRANCH: main
      GITHUB_PAT_FILE: /run/secrets/github_pat
    working_dir: /app/src/backend
    volumes:
      - workspace:/app
    secrets:
      - github_pat
    ports:
      - "8000:8000"
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    environment:
      VITE_HOST: 0.0.0.0
    working_dir: /app/src/frontend
    volumes:
      - workspace:/app
    secrets:
      - github_pat
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - appnet

volumes:
  workspace:

secrets:
  github_pat:
    file: ./.secrets/github_pat.txt   # Put your PAT file here (add to .gitignore)

networks:
  appnet:
    driver: bridge