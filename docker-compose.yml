version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./src:/src:cached
      - /src/backend/backend-venv  # Exclude virtual environment
    env_file:
      - .env
    environment:
      - PYTHONPATH=/src/backend
    working_dir: /src/backend
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./src:/src:cached
      - /src/my-pwa-frontend/node_modules  # Exclude node_modules
    environment:
      - VITE_HOST=0.0.0.0
    depends_on:
      - backend
    working_dir: /src/my-pwa-frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]