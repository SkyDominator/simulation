version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      PYTHONPATH: /app/src/backend
      REPO_URL: https://github.com/your-org/your-repo.git
      GIT_BRANCH: main
    working_dir: /app/src/backend
    command: ["/bin/bash", "/entrypoints/backend-entrypoint.sh"]
    volumes:
      - workspace:/app
      - ./entrypoints:/entrypoints:ro
    ports:
      - "8000:8000"
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    environment:
      VITE_HOST: 0.0.0.0
      REPO_URL: https://github.com/your-org/your-repo.git
      GIT_BRANCH: main
    working_dir: /app/src/my-pwa-frontend
    command: ["/bin/bash", "/entrypoints/frontend-entrypoint.sh"]
    volumes:
      - workspace:/app
      - ./entrypoints:/entrypoints:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    networks:
      - appnet

volumes:
  workspace:

networks:
  appnet:
    driver: bridge