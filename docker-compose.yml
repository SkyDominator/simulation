version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    image: simulation_backend:latest
    container_name: simulation_backend
    restart: always
    environment:
      - ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
    image: simulation_frontend:latest
    container_name: simulation_frontend
    restart: always
    ports:
      - "8080:80" # Cloudflare Tunnel will forward to host:8080
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
