# docker-compose.yml

version: '3.8'

services:
  backend:
    build:
      context: . # 빌드 컨텍스트를 프로젝트 루트(.)로 설정
      dockerfile: src/backend/Dockerfile # 사용할 Dockerfile 경로 지정
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/workspaces/src/backend # 소스코드 동기화 경로 수정

  frontend:
    build:
      context: . # 빌드 컨텍스트를 프로젝트 루트(.)로 설정
      dockerfile: src/my-pwa-frontend/Dockerfile # 사용할 Dockerfile 경로 지정
    ports:
      - "5173:5173"
    volumes:
      - ./src/my-pwa-frontend:/workspaces/src/my-pwa-frontend # 소스코드 동기화 경로 수정
      # node_modules는 동기화에서 제외
      - /workspaces/src/my-pwa-frontend/node_modules