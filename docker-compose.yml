version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached
      - backend_venv:/app/src/backend/backend-venv  # named volume for backend venv
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src/backend
    working_dir: /app/src/backend
    # keep container running but don't auto-start the app; start uvicorn manually via debugger/exec
    
    # command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    command: tail -f /dev/null

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./:/app:cached
      - frontend_node_modules:/app/src/my-pwa-frontend/node_modules  # named volume for node_modules
    environment:
      - VITE_HOST=0.0.0.0
    depends_on:
      - backend
    working_dir: /app/src/my-pwa-frontend
    # keep container running but don't auto-start the dev server; start npm manually when needed
    
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    # command: tail -f /dev/null

volumes:
  backend_venv:
    driver: local
  frontend_node_modules:
    driver: local