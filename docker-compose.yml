version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    ports:
      - "8000:8000"
    # --- 이 부분을 수정 ---
    # 프로젝트 전체(.)를 컨테이너의 /workspaces에 연결
    volumes:
      - .:/workspaces:cached
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: src/my-pwa-frontend/Dockerfile
    ports:
      - "5173:5173"
    # --- 이 부분도 일관성을 위해 수정 ---
    volumes:
      - .:/workspaces:cached
    command: npm run dev -- --host