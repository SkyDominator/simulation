version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src/backend
    working_dir: /app/src/backend
    command: tail -f /dev/null  # debugger (VS Code) will launch uvicorn
    networks:
      - appnet

  frontend:
    build:
      context: ./src/my-pwa-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./:/app:cached
      - frontend_node_modules:/app/src/my-pwa-frontend/node_modules
    environment:
      VITE_HOST: 0.0.0.0
    depends_on:
      - backend
    working_dir: /app/src/my-pwa-frontend
    command: tail -f /dev/null  # task / debugger starts dev server
    networks:
      - appnet

volumes:
  frontend_node_modules:
    driver: local

networks:
  appnet:
    driver: bridge