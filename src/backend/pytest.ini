[pytest]
pythonpath = .
markers =
    unit: marks tests as unit tests (isolated, no external I/O)
    unit_slow: marks tests as slow unit tests (deselect with '-m "not unit_slow"')
    integration: marks tests as integration tests for API endpoints
    api: marks tests as API endpoint tests  
    security_unit: marks tests as unit-level security tests
    security_integration: marks tests as integration-level security tests
    slow: marks tests as slower running tests
